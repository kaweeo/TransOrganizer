{% load static %}
{% load common_extras %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TransOrganizer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ink: #0b0f14;
            --muted: #5f6b7a;
            --brand: #06b6d4;
            --brand-strong: #0284c7;
            --accent: #f97316;
            --accent-strong: #f43f5e;
            --paper: #f5f7fb;
            --panel: #ffffff;
            --outline: rgba(15, 23, 42, 0.08);
            --glow: rgba(6, 182, 212, 0.18);
            --header-bg: #20abb0;
            --header-bg-2: #1a8f95;
            --header-ink: #f8fafc;
            --header-muted: rgba(248, 250, 252, 0.72);
            --footer-bg: #20abb0;
            --footer-bg-2: #1a8f95;
            --footer-ink: #e2e8f0;
            --footer-muted: rgba(226, 232, 240, 0.72);
        }
        body {
            font-family: "Sora", sans-serif;
            color: var(--ink);
            background: radial-gradient(900px 500px at 10% -10%, rgba(6, 182, 212, 0.18), transparent),
                        radial-gradient(900px 520px at 90% -20%, rgba(244, 63, 94, 0.18), transparent),
                        linear-gradient(180deg, #f9fafb 0%, #f0f4f8 100%);
            min-height: 100vh;
        }
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -1;
        }
        body::before {
            top: -140px;
            left: -120px;
            background: rgba(6, 182, 212, 0.35);
        }
        body::after {
            bottom: -160px;
            right: -120px;
            background: rgba(244, 63, 94, 0.35);
        }
        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: linear-gradient(135deg, var(--header-bg) 0%, var(--header-bg-2) 100%);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 1.1rem 0;
        }
        .nav-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--header-ink) !important;
        }
        h1, h2, h3, h4, h5 {
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: -0.01em;
        }
        .nav-link {
            color: var(--header-muted);
        }
        .nav-link.active {
            color: var(--header-ink) !important;
            font-weight: 600;
        }
        .hero-card {
            background: var(--panel);
            border: 1px solid var(--outline);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            border-radius: 18px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hero-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 50px rgba(15, 23, 42, 0.12);
        }
        .hero-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(1200px 200px at -10% -20%, rgba(6, 182, 212, 0.08), transparent);
            pointer-events: none;
        }
        .stat-card {
            border-radius: 16px;
            background: var(--panel);
            border: 1px solid var(--outline);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }
        .table thead {
            background: rgba(15, 23, 42, 0.04);
        }
        .table tbody tr:hover {
            background: rgba(15, 118, 110, 0.04);
        }
        .badge-pill {
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
        }
        .btn {
            border-radius: 999px;
            padding: 0.45rem 1.1rem;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 25px rgba(15, 23, 42, 0.12);
        }
        .footer {
            margin-top: auto;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            background: linear-gradient(135deg, var(--footer-bg) 0%, var(--footer-bg-2) 100%);
            color: var(--footer-ink);
            padding: 1.1rem 0;
        }
        .btn-brand {
            background: var(--brand);
            color: white;
            border: 0;
            box-shadow: 0 10px 24px rgba(6, 182, 212, 0.25);
        }
        .btn-brand:hover {
            background: var(--brand-strong);
            color: white;
        }
        .btn-outline-brand {
            border-color: var(--brand);
            color: var(--brand);
        }
        .btn-outline-brand:hover {
            background: var(--brand);
            color: white;
        }
        .page-fade {
            animation: fadeUp 0.5s ease both;
        }
        .page-fade .hero-card,
        .page-fade .stat-card {
            animation: cardReveal 0.6s ease both;
        }
        .page-fade .hero-card:nth-of-type(2),
        .page-fade .stat-card:nth-of-type(2) {
            animation-delay: 0.05s;
        }
        .page-fade .hero-card:nth-of-type(3),
        .page-fade .stat-card:nth-of-type(3) {
            animation-delay: 0.1s;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .nav-link,
        .btn,
        .hero-card,
        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
        }
        .nav-link:hover {
            color: var(--header-ink) !important;
        }
        .navbar .btn-outline-brand {
            border-color: rgba(248, 250, 252, 0.55);
            color: var(--header-ink);
            background: rgba(248, 250, 252, 0.08);
        }
        .navbar .btn-outline-brand:hover {
            background: rgba(248, 250, 252, 0.18);
            color: var(--header-ink);
            border-color: rgba(248, 250, 252, 0.8);
        }
        .navbar-toggler {
            border-color: rgba(248, 250, 252, 0.4);
        }
        .navbar-toggler-icon {
            filter: invert(1);
        }
        .footer a {
            color: var(--footer-ink);
            text-decoration: none;
        }
        .footer a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
        .footer .btn-outline-brand {
            border-color: rgba(226, 232, 240, 0.55);
            color: var(--footer-ink);
            background: rgba(226, 232, 240, 0.08);
        }
        .footer .btn-outline-brand:hover {
            background: rgba(226, 232, 240, 0.18);
            color: #ffffff;
            border-color: rgba(226, 232, 240, 0.85);
        }
        .footer .text-muted {
            color: var(--footer-muted) !important;
        }
        .table tbody tr {
            transition: background 0.2s ease;
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::before {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.7), transparent);
            animation: shimmer 2.6s infinite;
        }
        @keyframes shimmer {
            0% { left: -150%; }
            50% { left: 120%; }
            100% { left: 120%; }
        }
        .form-label {
            font-weight: 600;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            background: rgba(6, 182, 212, 0.12);
            color: var(--brand-strong);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-responsive {
            width: 100%;
        }
        @media (min-width: 576px) {
            .btn-responsive {
                width: auto;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    {% include "partials/_header.html" %}
    <main class="container py-4 page-fade">
        {% block content %}{% endblock %}
    </main>
    {% include "partials/_footer.html" %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>

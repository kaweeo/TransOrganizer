{% extends "base.html" %}

{% block title %}Delete Driver | TransOrganizer{% endblock %}

{% block content %}
<div class="hero-card p-5">
    <h1 class="h4">Delete Driver {{ object.name }}</h1>
    <p class="text-muted">This will remove the driver from the system. Existing orders will lose the assignment.</p>
    <form method="post" class="d-flex flex-wrap gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-brand">Confirm Delete</button>
        <a class="btn btn-outline-secondary" href="{% url 'driver-detail' object.pk %}">Cancel</a>
    </form>
</div>
{% endblock %}

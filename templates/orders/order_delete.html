{% extends "base.html" %}

{% block title %}Delete Order | TransOrganizer{% endblock %}

{% block content %}
<div class="hero-card p-5">
    <h1 class="h4">Delete Order #{{ object.id }}</h1>
    <p class="text-muted">This action cannot be undone. Confirm deletion of the order from {{ object.origin }} to {{ object.destination }}.</p>
    <form method="post" class="d-flex flex-wrap gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-brand">Confirm Delete</button>
        <a class="btn btn-outline-secondary" href="{% url 'order-detail' object.pk %}">Cancel</a>
    </form>
</div>
{% endblock %}
